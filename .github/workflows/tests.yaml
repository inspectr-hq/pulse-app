name: Pulse Tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  swift-tests:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run Swift tests
        run: swift test
