name: Pulse Tests

on:
  pull_request:
  # workflow_dispatch: # Disable workflow

jobs:
  swift-tests:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run Swift tests
        run: swift test
